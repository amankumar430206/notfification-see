<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SSE - User Specific Notifications</title>
    <style>
      body {
        font-family: system-ui;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px;
      }
      #feed {
        background: #1e2937;
        padding: 15px;
        border-radius: 12px;
        max-height: 60vh;
        overflow-y: auto;
      }
      .event {
        padding: 12px;
        margin: 10px 0;
        background: #334155;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🔔 Personal Live Notifications (SSE)</h1>
    <div>
      <label>Your User ID: <input id="userId" value="123" style="padding: 8px" /></label>
      <button onclick="connect()">Connect</button>
    </div>

    <div id="status" style="margin: 10px 0; color: #22c55e">● Disconnected</div>

    <h2>Your Personal Feed</h2>
    <div id="feed"></div>

    <h3>Send Test Notification to User</h3>
    <input id="targetUser" placeholder="Target User ID" value="123" style="padding: 8px" />
    <input id="msg" placeholder="Message" style="padding: 8px; width: 300px" />
    <button onclick="sendToUser()">Send to Specific User</button>

    <script>
      let eventSource = null;
      const feed = document.getElementById("feed");
      const status = document.getElementById("status");

      function connect() {
        if (eventSource) eventSource.close();

        const userId = document.getElementById("userId").value.trim();
        if (!userId) return alert("Enter User ID");

        eventSource = new EventSource(`/events?userId=${encodeURIComponent(userId)}`);

        eventSource.onopen = () => {
          status.textContent = `● Connected as User ${userId}`;
          status.style.color = "#22c55e";
        };

        eventSource.onmessage = (event) => {
          const data = JSON.parse(event.data);
          const div = document.createElement("div");
          div.className = "event";
          div.innerHTML = `
          <strong>${data.type.toUpperCase()}</strong> 
          <small style="float:right">${new Date(data.timestamp).toLocaleTimeString()}</small><br>
          ${data.message}
          ${data.userId ? `<br><small>for user: ${data.userId}</small>` : ""}
        `;
          feed.prepend(div);
        };

        eventSource.onerror = () => {
          status.textContent = "⚠️ Connection error (reconnecting...)";
          status.style.color = "#eab308";
        };
      }

      function sendToUser() {
        const targetUser = document.getElementById("targetUser").value.trim();
        const message = document.getElementById("msg").value.trim();
        if (!targetUser || !message) return;

        fetch("/send-to-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: targetUser, message }),
        })
          .then((r) => r.json())
          .then(console.log);
      }

      // Auto-connect with default userId on load
      window.onload = () => connect();
    </script>
  </body>
</html>
